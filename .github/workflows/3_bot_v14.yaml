name: V15 Prop Desk Engine
on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
concurrency:
  group: usine-trading
  cancel-in-progress: false
jobs:
  run-v14:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn requests joblib
      - name: 🚀 Lancement de la V15
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python entraineur_retail.py || true
      - name: 💾 Sauvegarde Portfolio
        run: |
          git config --global user.name "Trading Bot V15"
          git config --global user.email "v15@trading.local"
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add portfolio_v15_fund.json || true
          if ! git diff --staged --quiet; then
            git commit -m "📊 MAJ V15 - $(date '+%d/%m/%Y %H:%M')"
            git push
          else
            echo "Aucun changement à sauvegarder."
          fi
