name: 🧠 1. Intelligence & Risk

on:
  schedule:
    - cron: '00 21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: usine-trading
  cancel-in-progress: false

jobs:
  run-brain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔬 Run Labs (Data)
        run: |
          python regime_kmeans.py || true
          python regime_hmm.py || true
          python labo_sentiment.py || true
          python pairs_bot.py || true
          
      - name: 🧠 Run Meta-Controller (Boss)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 🚨 NO "|| true" HERE! If the Boss fails, the pipeline STOPS.
        run: python meta_controlleur.py

      - name: 💾 Save Intelligence State
        run: |
          git config --global user.name "Hedge Fund Brain"
          git config --global user.email "brain@trading.local"
          git pull --rebase --autostash origin main || true
          git add *_log.json global_settings.json || true
          if ! git diff --staged --quiet; then
            git commit -m "🧠 Market Intelligence Updated - $(date '+%d/%m/%Y %H:%M')"
            git push
          fi
