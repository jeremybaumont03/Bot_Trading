name: Laboratoire de Recherche (Ligne B)

on:
  schedule:
    # 21h00 UTC = 23h00 Paris (Heure d'été) -> Tourne AVANT les bots !
    - cron: '00 21 * * 1-5'
  workflow_dispatch:
concurrency:
  group: usine-trading
  cancel-in-progress: false
jobs:
  run-labo:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation des librairies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas statsmodels hmmlearn scikit-learn requests

      - name: 🚲 Exécution K-Means
        run: python regime_kmeans.py || echo "K-Means a échoué mais on continue"

      - name: 🏎️ Exécution HMM
        run: python regime_hmm.py || echo "HMM a échoué mais on continue"

      - name: ⚖️ Exécution Pairs Trading
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pairs_bot.py || echo "Pairs Bot a échoué mais on continue"

      - name: 💾 Sauvegarde des journaux de recherche
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # On ajoute les fichiers de logs
          git add pairs_log.json regime_log.json kmeans_log.json || true
          
          # Sauvegarde propre
          if ! git diff --staged --quiet; then
            git commit -m "🔬 Mise à jour des logs du Laboratoire"
            git pull --rebase origin main
            git push
          else
            echo "Aucun nouveau log de recherche à enregistrer."
          fi
