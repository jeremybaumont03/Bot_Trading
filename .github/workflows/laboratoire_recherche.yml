name: Laboratoire de Recherche (Ligne B)

on:
  schedule:
    # 22h30 UTC = 00h30 Paris (Heure d'été)
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  run-labo:
    runs-on: ubuntu-latest
    
    # 🔴 CORRECTION 1 : L'autorisation d'écrire sur ton GitHub
    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requis pour pouvoir faire un push propre

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation des librairies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas statsmodels hmmlearn scikit-learn requests

      - name: 🚲 Exécution K-Means
        run: python regime_kmeans.py || echo "K-Means a échoué mais on continue"

      - name: 🏎️ Exécution HMM
        run: python regime_hmm.py || echo "HMM a échoué mais on continue"

      - name: ⚖️ Exécution Pairs Trading
        env:
          # 🔴 CORRECTION 2 : Le bon nom pour ton token Telegram
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pairs_bot.py || echo "Pairs Bot a échoué mais on continue"

      - name: 💾 Sauvegarde des journaux de recherche
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # On force l'ajout des fichiers (même s'ils sont créés pour la 1ère fois)
          git add pairs_log.json regime_log.json kmeans_log.json || true
          
          # 🔴 CORRECTION 3 : Une méthode de sauvegarde beaucoup plus fiable
          if ! git diff --staged --quiet; then
            git commit -m "🔬 Mise à jour des logs du Laboratoire"
            # Sécurité : on télécharge les modifications des autres bots avant de pousser
            git pull --rebase origin main
            git push
          else
            echo "Aucun nouveau log de recherche à enregistrer."
          fi
