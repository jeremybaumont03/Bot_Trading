name: Trading Bot Multi-Stratégies

on:
  schedule:
    # 21h15 UTC = 23h15 Paris (Heure d'été CEST)
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement des 6 Bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python entraineur.py || true
          python entraineur_lr.py || true
          python entraineur_gb.py || true
          python entraineur_conservative.py || true
          python entraineur_aggressive.py || true
          python entraineur_mr.py || true
          
      - name: Sauvegarder tous les portfolios
        run: |
          git config --global user.name "Trading Bot"
          git config --global user.email "bot@trading.local"
          git add *.json
          git diff --staged --quiet || git commit -m "📊 MAJ Multi-stratégies - $(date '+%d/%m/%Y %H:%M')"
          git push
