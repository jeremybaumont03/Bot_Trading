name: Trading Bot Multi-Stratégies

on:
  schedule:
    # 21h15 UTC = 22h15 Paris
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      # --- C'EST ICI QUE ÇA CHANGE ---
      # On ajoute 'env' pour que Python puisse lire tes secrets
      - name: Lancement des 5 Bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python entraineur.py
          python entraineur_lr.py
          python entraineur_gb.py
          python entraineur_conservative.py
          python entraineur_aggressive.py

      - name: Sauvegarder tous les portfolios
        run: |
          git config --global user.name "Trading Bot"
          git config --global user.email "bot@trading.local"
          # On ajoute tous les fichiers JSON pour ne rien perdre
          git add *.json
          git diff --staged --quiet || git commit -m "📊 MAJ Multi-stratégies - $(date '+%d/%m/%Y %H:%M')"
          git push
