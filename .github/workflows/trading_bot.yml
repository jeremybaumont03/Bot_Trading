name: 🤖 2. Bot Execution

on:
  schedule:
    - cron: '30 21 * * 1-5' # 21:30 UTC (30 mins after Brain)
  workflow_dispatch:

concurrency:
  group: usine-trading
  cancel-in-progress: false

jobs:
  run-bots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn requests joblib

      - name: 🚀 Execute Trading Bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: 
          # The "|| true" ensures if one bot fails, the others still run!
          python pairs_bot.py || true
          python entraineur.py || true
          python entraineur_lr.py || true
          python entraineur_gb.py || true
          python entraineur_conservative.py || true
          python entraineur_aggressive.py || true
          python entraineur_meanreversion.py || true
          python entraineur_meanreversion_canard.py || true
          python entraineur_retail.py || true

      - name: 💾 Save Portfolios
        run: |
          git config --global user.name "Hedge Fund Execution"
          git config --global user.email "execution@trading.local"
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add portfolio*.json backups/ || true
          if ! git diff --staged --quiet; then
            git commit -m "💼 Portfolios Updated - $(date '+%d/%m/%Y %H:%M')"
            git push
          fi
