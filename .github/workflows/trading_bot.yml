name: 🤖 2. Bot Execution

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: usine-trading
  cancel-in-progress: false

jobs:
  run-bots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Execute Trading Bots (Isolated & Time-boxed)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BOTS=(
            "pairs_bot.py"
            "entraineur.py"
            "entraineur_lr.py"
            "entraineur_gb.py"
            "entraineur_conservative.py"
            "entraineur_aggressive.py"
            "entraineur_meanreversion.py"
            "entraineur_meanreversion_canard.py"
            "entraineur_retail.py"
          )
          
          for bot in "${BOTS[@]}"; do
            if [ -f "$bot" ]; then
              echo "⚡ Lancement de $bot..."
              if [ "$bot" == "entraineur_retail.py" ]; then
                # V15 gets 15 minutes (900 seconds)
                timeout 900 python "$bot" || echo "⚠️ Échec ou Timeout (900s) sur $bot."
              else
                # Others get 5 minutes (300 seconds)
                timeout 300 python "$bot" || echo "⚠️ Échec ou Timeout (300s) sur $bot."
              fi
            fi
          done

      - name: 💾 Save Portfolios (Safe Git)
        run: |
          git config --global user.name "Hedge Fund Execution"
          git config --global user.email "execution@trading.local"
          git pull --rebase --autostash origin main || true
          
          # Only save portfolios and backups
          git add portfolio*.json backups/ || true
          
          if ! git diff --staged --quiet; then
            git commit -m "💼 Portfolios Updated - $(date '+%d/%m/%Y %H:%M')"
            git push
          fi
