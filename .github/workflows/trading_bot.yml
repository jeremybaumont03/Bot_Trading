name: 🤖 2. Bot Execution

on:
  schedule:
    - cron: '30 21 * * 1-5' # Runs at 21:30 UTC, Monday through Friday
  workflow_dispatch:        # Allows you to trigger it manually from the GitHub UI

concurrency:
  group: usine-trading
  cancel-in-progress: false

jobs:
  run-bots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Execute Trading Bots (Isolated & Time-boxed)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BOTS=(
            "pairs_bot.py"
            "entraineur.py"
            "entraineur_lr.py"
            "entraineur_gb.py"
            "entraineur_conservative.py"
            "entraineur_aggressive.py"
            "entraineur_meanreversion.py"
            "entraineur_meanreversion_canard.py"
            "entraineur_retail.py"
          )
          
          for bot in "${BOTS[@]}"; do
            if [ -f "$bot" ]; then
              echo "⚡ Launching $bot..."
              if [ "$bot" == "entraineur_retail.py" ]; then
                # V15 gets 15 minutes (900 seconds)
                timeout 900 python "$bot" || echo "⚠️ Failure or Timeout (900s) on $bot."
              else
                # Others get 5 minutes (300 seconds)
                timeout 300 python "$bot" || echo "⚠️ Failure or Timeout (300s) on $bot."
              fi
            fi
          done

      - name: 💾 Save Portfolios & Logs (Safe Git)
        run: |
          git config --global user.name "Hedge Fund Execution"
          git config --global user.email "execution@trading.local"
          git pull --rebase --autostash origin main || true
          
          # ✅ THE FIX: Added *_log.json to capture pairs_log.json
          git add portfolio*.json *_log.json backups/ || true
          
          if ! git diff --staged --quiet; then
            git commit -m "💼 Portfolios & Logs Updated - $(date '+%d/%m/%Y %H:%M')"
            git push
          fi

      - name: 🏦 Execute Orders on Alpaca (Execution Engine)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Ensure the execution engine has the exact libraries it needs
          pip install alpaca-py yfinance requests
          
          # Fire the execution engine
          python broker_execution.py
