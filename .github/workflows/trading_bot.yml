name: Trading Bot Multi-Stratégies

on:
  schedule:
    # 21h15 UTC = 23h15 Paris (Heure d'été)
    - cron: '15 21 * * 1-5'
  workflow_dispatch:
concurrency:
  group: usine-trading
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 🚨 TRÈS IMPORTANT : Donne le droit à GitHub de sauvegarder tes fichiers
    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour éviter les erreurs de push

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Accélère les lancements futurs

      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 🧠 1. Le Boss parle en premier (AVEC l'antenne Telegram)
      - name: 🧠 Lancement du Meta-Controller (Génère global_settings.json)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python meta_controller.py || true

      # 🤖 2. L'armée de bots s'exécute
      - name: Lancement des 7 Bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python entraineur.py || true
          python entraineur_lr.py || true
          python entraineur_gb.py || true
          python entraineur_conservative.py || true
          python entraineur_aggressive.py || true
          python entraineur_meanreversion.py || true
          python entraineur_meanreversion_canard.py || true
          
      # 💾 3. Sauvegarde propre
      - name: Sauvegarder et Synchroniser
        run: |
          git config --global user.name "Trading Bot"
          git config --global user.email "bot@trading.local"
          
          # On ajoute tout : portfolios, logs, settings et backups
          git add *.json backups/ || true
          
          # On vérifie s'il y a des changements avant de commit
          if ! git diff --staged --quiet; then
            git commit -m "📊 MAJ Multi-stratégies - $(date '+%d/%m/%Y %H:%M')"
            # Sécurité : on "pull" les changements éventuels avant de "push"
            git pull --rebase origin main
            git push
          else
            echo "Aucun changement à sauvegarder aujourd'hui."
          fi
