name: Fleet Commander (Trading Bots)

on:
  schedule:
    # Se lance du Lundi au Vendredi à 22h15 UTC (fin de journée de bourse)
    - cron: '15 22 * * 1-5' 
  workflow_dispatch: # Permet de lancer le workflow manuellement via un bouton sur GitHub

jobs:
  run-trading-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn requests
        
      - name: 🧠 1. Run Meta-Controller (Génère global_settings.json)
        run: python meta_controller.py
        
      - name: 🤖 2. Run Random Forest (Standard)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python entraineur.py || true
        
      - name: 🦅 3. Run Random Forest (Agressif)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python entraineur_aggressive.py || true
        
      - name: 🛡️ 4. Run Random Forest (Conservateur)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python entraineur_conservative.py || true
        
      - name: 📈 5. Run Logistic Regression
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python entraineur_lr.py || true
        
      - name: 🚀 6. Run Gradient Boosting
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python entraineur_gb.py || true

      - name: 🐦 7. Run Canary Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python entraineur_mr_canary.py || true

      - name: Commit and Push Portfolios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portfolio*.json global_settings.json backups/
          git commit -m "🤖 Auto-update portfolios & settings" || echo "No changes to commit"
          git push
